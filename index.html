const R = (v) => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
// Data local (Brasil) no formato YYYY-MM-DD — evita o bug de UTC avançar um dia depois das 21h
const localDateStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate = () => new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

function reducer(state, action) {
  switch(action.type) {
    case 'SET':       return action.reqs;
    case 'ADD':       return [action.req,...state];
    case 'MARK_SENT': return state.map(r => r.id!==action.id ? r : {...r, sent_to_totvs:true});
    case 'UPDATE': return state.map(r => r.id!==action.id ? r : {
      ...r, status:action.status,
      history:[...r.history,{date:fmtDate(),actor:action.actor,action:action.label,comment:action.comment||''}]
    });
    case 'EDIT_FIELDS': return state.map(r => r.id!==action.id ? r : {...r, ...action.fields});
    default: return state;
  }
}

}

/* ═══════════════════════ CHARTS ═══════════════════════ */
function BarChart({ labels, values }) {
  const ref = useRef(); const chart = useRef();
  useEffect(() => {
    if (!window.Chart || !ref.current || !labels.length) return;
    if (chart.current) chart.current.destroy();
    chart.current = new window.Chart(ref.current.getContext('2d'), {
      type:'bar',
      data:{ labels, datasets:[{ data:values, backgroundColor:'#C9BBAA', hoverBackgroundColor:'#B8A892', borderRadius:6, borderSkipped:false }] },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c=>R(c.raw) }, backgroundColor:'#0A0A0A', titleFont:{family:'Raleway'}, bodyFont:{family:'Raleway'} } },
        scales:{
          y:{ beginAtZero:true, grid:{color:'rgba(0,0,0,.05)'}, ticks:{ callback:v=>v>=1000?'R$'+(v/1000).toFixed(0)+'k':'R$'+v, color:'#999', font:{family:'Raleway',size:11} }, border:{display:false} },
          x:{ grid:{display:false}, ticks:{color:'#888',font:{family:'Raleway',size:11}}, border:{display:false} }
        }
      }
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  },[labels.join(','), values.join(',')]);
  if(!labels.length) return <div className="h-full flex items-center justify-center text-sm text-gray-400">Sem dados</div>;
  return <canvas ref={ref}/>;
}

function DonutChart({ data }) {
  const ref = useRef(); const chart = useRef();
  const labels = data.map(d=>d.label), values = data.map(d=>d.value), colors = data.map(d=>d.color);
  useEffect(() => {
    if (!window.Chart || !ref.current || !data.length) return;
    if (chart.current) chart.current.destroy();
    chart.current = new window.Chart(ref.current.getContext('2d'), {
      type:'doughnut',
      data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderWidth:0, hoverOffset:4 }] },
      options:{
        responsive:true, maintainAspectRatio:false, cutout:'68%',
        plugins:{
          legend:{ position:'bottom', labels:{ color:'#666', font:{family:'Raleway',size:11}, padding:12, boxWidth:10, boxHeight:10, usePointStyle:true } },
          tooltip:{ backgroundColor:'#0A0A0A', titleFont:{family:'Raleway'}, bodyFont:{family:'Raleway'} }
        }
      }
    });
    return ()=>{ if(chart.current) chart.current.destroy(); };
  },[JSON.stringify(data)]);
  if(!data.length) return <div className="h-full flex items-center justify-center text-sm text-gray-400">Sem dados</div>;
  return <canvas ref={ref}/>;
}

/* ═══════════════════════ FORM NOVA SOLICITAÇÃO ═══════════════════════ */
function NewRequestForm({ user, requests, onSubmit, onBack, editReq }) {
  const isEdit = !!editReq;
  // Filtra opções por permissões do usuário ([] = todas liberadas)
  const allowedExpenses = user.allowed_expense_codes?.length > 0
    ? EXPENSE_TYPES.filter(e => user.allowed_expense_codes.includes(e.v))
    : EXPENSE_TYPES;
  const allowedDocs = user.allowed_document_types?.length > 0
    ? DOCUMENT_TYPES.filter(d => user.allowed_document_types.includes(d.v))
    : DOCUMENT_TYPES;

  const [title,setTitle]           = useState(editReq?.title||'');
  const [desc,setDesc]             = useState(editReq?.description||'');
  const [amount,setAmount]         = useState(editReq?.amount?String(editReq.amount):'');
  const [category,setCategory]     = useState(editReq?.category||'');
  const [dueDate,setDueDate]       = useState(editReq?.totvs?.dueDate||(()=>{ const d=new Date(Date.now()+7*864e5); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })());
  const [document,setDocument]     = useState(editReq?.totvs?.document||allowedDocs[0]?.v||15);
  const [expenseCode,setExpCode]   = useState(editReq?.totvs?.expenseCode||(allowedExpenses.length===1?allowedExpenses[0].v:''));
  const [rateio,setRateio]         = useState(editReq?.totvs?.proratedPercentage||100);
  const [parcelas,setParcelas]     = useState(editReq?.totvs?.parcelas||1);
  const [receipts,setReceipts]     = useState(editReq?.receipts||[]);
  const [errors,setErrors]         = useState({});
  const [loading,setLoading]       = useState(false);
  const fileRef = useRef();

  // Gera código de duplicata automático: AAAAMMDD + sequencial do dia (usa data local)
  const genDuplicateCode = () => {
    const today = new Date();
    const ymd = today.getFullYear().toString()
      + String(today.getMonth()+1).padStart(2,'0')
      + String(today.getDate()).padStart(2,'0'); // getFullYear/Month/Date = hora local, não UTC
    // Conta quantas solicitações de hoje já existem
    const todayStr = today.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    const seq = (requests||[]).filter(r=>r.created_at?.startsWith(todayStr)).length + 1;
    return parseInt(ymd + String(seq));
  };

  const handleFiles = e => {
    Array.from(e.target.files).forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>setReceipts(p=>[...p,{name:f.name,data:ev.target.result,type:f.type}]);
      r.readAsDataURL(f);
    });
    e.target.value='';
  };

  const validate = () => {
    const e={};
    if(!title.trim())  e.title  = 'Obrigatório';
    if(!desc.trim())   e.desc   = 'Obrigatório';
    if(!amount||isNaN(parseFloat(amount.replace(',','.')))) e.amount = 'Valor inválido';
    if(!category)      e.category = 'Selecione';
    if(!dueDate)       e.dueDate  = 'Obrigatório';
    if(!expenseCode)   e.expenseCode = 'Obrigatório';
    if(!receipts.length) e.receipts = 'Anexe ao menos um recibo';
    return e;
  };

  const submit = () => {
    const e=validate(); if(Object.keys(e).length){setErrors(e);return;}
    setLoading(true);
    const today = localDateStr();
    const totvsData = {
      supplierCpfCnpj:    editReq?.totvs?.supplierCpfCnpj||'28171353000173',
      duplicateCode:      isEdit?(editReq.totvs?.duplicateCode||genDuplicateCode()):genDuplicateCode(),
      bearerCode:         editReq?.totvs?.bearerCode||1020,
      issueDate:          today,
      dueDate:            dueDate,
      arrivalDate:        today,
      document:           parseInt(document),
      prevision:          2,
      stage:              1,
      expenseCode:        parseInt(expenseCode),
      costCenterCode:     editReq?.totvs?.costCenterCode||1,
      proratedPercentage: parseFloat(rateio)||100,
      observation:        desc.trim(),
      parcelas:           parseInt(parcelas)||1,
    };
    if(isEdit) {
      setTimeout(()=>onSubmit({
        ...editReq,
        title: title.trim(),
        description: desc.trim(),
        amount: parseFloat(amount.replace(',','.')),
        category, receipts,
        totvs: totvsData,
        status:'pending_gestor',
        history:[...(editReq.history||[]),{date:fmtDate(),actor:user.name,action:'Solicitação editada e reenviada para o gestor',comment:''}]
      }),400);
    } else {
      setTimeout(()=>onSubmit({
        id: String(Date.now()),
        title: title.trim(),
        description: desc.trim(),
        amount: parseFloat(amount.replace(',','.')),
        category, receipts,
        totvs: totvsData,
        status:'pending_gestor', solicitanteId:user.id, solicitanteName:user.name,
        created_at: fmtDate(),
        history:[{date:fmtDate(),actor:user.name,action:'Solicitação criada e enviada para revisão do gestor',comment:''}]
      }),400);
    }
  };

  const F  = 'w-full px-3 py-2.5 rounded-xl text-sm transition';
  const FS = (err)=>({background:'#FAFAF8',border:`1px solid ${err?'#EF4444':'#E0D9D0'}`,color:'#1A1A1A'});
  const onF = e=>e.target.style.borderColor='#C9BBAA';
  const onB = (err)=>e=>e.target.style.borderColor=err?'#EF4444':'#E0D9D0';
  const Lbl = ({children,err})=>(
    <label className="block text-xs font-semibold mb-1.5" style={{color:'#888',letterSpacing:'0.06em'}}>
      {children}{err&&<span style={{color:'#EF4444'}}> *</span>}
    </label>
  );
  const Err = ({msg})=>msg?<p className="text-xs mt-1" style={{color:'#EF4444'}}>{msg}</p>:null;

  return (
    <div className="max-w-2xl fade">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-2 rounded-xl transition" style={{background:'#fff',border:'1px solid #EDE8E3'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='#C9BBAA'} onMouseLeave={e=>e.currentTarget.style.borderColor='#EDE8E3'}>
          <I.back/>
        </button>
        <div>

        {/* Valor + Categoria */}

          <div>
            <Lbl err>CATEGORIA</Lbl>
            <select value={category} onChange={e=>setCategory(e.target.value)}
              className={F} style={{...FS(errors.category),appearance:'none'}} onFocus={onF} onBlur={onB(errors.category)}>
              <option value="">Selecionar...</option>
              {CATEGORIES.map(c=><option key={c}>{c}</option>)}
            </select>
            <Err msg={errors.category}/>
          </div>
        </div>

        {/* Parcelas + Data de vencimento da 1ª */}
        <div className="grid grid-cols-2 gap-3">
          <div>
            <Lbl err>DATA 1º VENCIMENTO</Lbl>
            <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}

          </div>
          <div>
            <Lbl>PARCELAS</Lbl>
            <select value={parcelas} onChange={e=>setParcelas(e.target.value)}

            </select>
          </div>
        </div>

        {/* Preview das parcelas */}
        {parcelas>1 && amount && !isNaN(parseFloat(amount.replace(',','.'))) && (()=>{
          const total = parseFloat(amount.replace(',','.'));
          const n = parseInt(parcelas);
          const valParcela = total / n;
          const firstDue = new Date(dueDate+'T12:00:00');
          return (
            <div className="rounded-xl p-3 space-y-1.5" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
              <p className="text-xs font-bold mb-2" style={{color:'#AAA',letterSpacing:'0.06em'}}>PRÉVIA DAS PARCELAS</p>
              {Array.from({length:n},(_,i)=>{
                const d = new Date(firstDue); d.setDate(d.getDate()+(i*30));
                return (
                  <div key={i} className="flex items-center justify-between text-xs">
                    <span style={{color:'#888'}}>Parcela {i+1}</span>
                    <div className="flex items-center gap-3">
                      <span style={{color:'#666'}}>{d.toLocaleDateString('pt-BR')}</span>
                      <span className="font-bold" style={{color:'#C9BBAA'}}>{R(valParcela)}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* Tipo documento + Cód. Despesa + Rateio */}
        <div className="grid grid-cols-3 gap-3">
          <div>
            <Lbl>TIPO DE DOCUMENTO</Lbl>
            <select value={document} onChange={e=>setDocument(e.target.value)}

              {allowedDocs.map(d=><option key={d.v} value={d.v}>{d.v} — {d.l}</option>)}
            </select>
          </div>
          <div>
            <Lbl err>DESPESA</Lbl>
            <select value={expenseCode} onChange={e=>setExpCode(e.target.value)}
              className={F} style={{...FS(errors.expenseCode),appearance:'none'}} onFocus={onF} onBlur={onB(errors.expenseCode)}>
              <option value="">Selecionar...</option>
              {allowedExpenses.map(d=><option key={d.v} value={d.v}>{d.v} — {d.l}</option>)}
            </select>
            <Err msg={errors.expenseCode}/>
          </div>
          <div>
            <Lbl>% RATEIO</Lbl>
            <input type="number" min="0" max="100" value={rateio} onChange={e=>setRateio(e.target.value)}
              className={F} style={FS(false)} onFocus={onF} onBlur={onB(false)}/>
          </div>
        </div>

        {/* Descrição / Observação */}
        <div>
          <Lbl err>DESCRIÇÃO / OBSERVAÇÃO</Lbl>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3}
            placeholder="Descreva o motivo, fornecedor e detalhes da despesa..."
            className={F+' resize-none'} style={FS(errors.desc)} onFocus={onF} onBlur={onB(errors.desc)}/>
          <Err msg={errors.desc}/>
        </div>

        {/* Recibos */}
        <div>
          <Lbl err>RECIBOS / COMPROVANTES</Lbl>
          <div onClick={()=>fileRef.current.click()}
            className="flex flex-col items-center justify-center py-5 rounded-xl cursor-pointer transition"
            style={{border:`2px dashed ${errors.receipts?'#EF4444':'#D4C5B0'}`,background:'#FAFAF8'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=errors.receipts?'#EF4444':'#B8A892'}
            onMouseLeave={e=>e.currentTarget.style.borderColor=errors.receipts?'#EF4444':'#D4C5B0'}>
            <div style={{color:'#C9BBAA'}}><I.upload/></div>
            <p className="text-sm font-medium mt-2" style={{color:'#888'}}>Clique para anexar</p>
            <p className="text-xs mt-0.5" style={{color:'#BBB'}}>JPG, PNG ou PDF</p>
          </div>
          <input ref={fileRef} type="file" accept="image/*,.pdf" multiple onChange={handleFiles} style={{display:'none'}}/>
          <Err msg={errors.receipts}/>
          {receipts.length>0&&(
            <div className="mt-2 space-y-1.5">
              {receipts.map((r,i)=>(
                <div key={i} className="flex items-center gap-2.5 rounded-xl px-3 py-2" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
                  {r.type?.startsWith('image')?<img src={r.data} alt="" className="w-8 h-8 object-cover rounded-lg"/>:<div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'#E8DDD0',color:'#B8A892'}}><I.file/></div>}
                  <span className="flex-1 text-xs truncate" style={{color:'#666'}}>{r.name}</span>
                  <button onClick={()=>setReceipts(p=>p.filter((_,j)=>j!==i))} className="transition" style={{color:'#BBB'}} onMouseEnter={e=>e.currentTarget.style.color='#EF4444'} onMouseLeave={e=>e.currentTarget.style.color='#BBB'}><I.x/></button>
                </div>
              ))}
            </div>
          )}
        </div>

      </div>

      {/* Botões */}
      <div className="flex gap-3">
        <button onClick={onBack} className="flex-1 py-3 rounded-xl text-sm font-medium transition"
          style={{border:'1px solid #E0D9D0',color:'#666',background:'#fff'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='#C9BBAA'} onMouseLeave={e=>e.currentTarget.style.borderColor='#E0D9D0'}>
          Cancelar
        </button>
        <button onClick={submit} disabled={loading}
          className="flex-1 py-3 rounded-xl text-sm font-semibold transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-60"
          style={{background:'#0A0A0A',color:'#C9BBAA'}}>
          {loading?<><Spinner/>Enviando...</>:(isEdit?'Reenviar para o Gestor':'Enviar para Revisão')}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════ TOTVS PAYLOAD BUILDER ═══════════════════════ */
function buildTotvsPayload(req) {
  const t = req.totvs || {};
  const n = parseInt(t.parcelas)||1;
  const valParcela = Math.round((req.amount / n) * 100) / 100;
  const issueDate   = new Date((t.issueDate  ||localDateStr())+'T00:00:00Z').toISOString();
  const arrivalDate = new Date((t.arrivalDate||localDateStr())+'T00:00:00Z').toISOString();
  const firstDue    = new Date((t.dueDate    ||localDateStr())+'T00:00:00Z');
  return {
    branchCnpj:      TOTVS_BRANCH_CNPJ,
    duplicateCode:   t.duplicateCode,
    supplierCpfCnpj: String(t.supplierCpfCnpj||'').replace(/\D/g,''),
    installments: Array.from({length:n},(_,i)=>{
      const due=new Date(firstDue); due.setDate(due.getDate()+(i*30));
      return {
        installmentCode: i+1, bearerCode:t.bearerCode,
        issueDate, dueDate:due.toISOString(), arrivalDate,
        document:t.document, duplicateValue:valParcela,
        prevision:t.prevision, stage:t.stage,
        expenses:[{expenseCode:t.expenseCode,costCenterCode:t.costCenterCode,proratedPercentage:t.proratedPercentage||100}],
        ...(t.observation?{observations:[{observation:t.observation}]}:{}),
      };
    }),
  };
}

/* ═══════════════════════ REQUEST DETAIL ═══════════════════════ */
function RequestDetail({ req, user, onBack, dispatch, showToast, onEdit }) {
  const [modal,setModal]=useState(null);
  const [comment,setComment]=useState('');
  const [lightbox,setLightbox]=useState(null);
  const [totvsLoading, setTotvsLoading] = useState(false);
  const [totvsResult,  setTotvsResult]  = useState(null);

  const isGestor=user.role==='gestor', isDiretor=user.role==='diretor', isFinanceiro=user.role==='financeiro';
  const isSolicitante=user.role==='solicitante';
  const canActGestor    = isGestor    && req.status==='pending_gestor';
  const canActDiretor   = isDiretor   && req.status==='pending_diretor';
  const canActFin       = isFinanceiro && req.status==='pending_financeiro';
  const canEditReturn   = isSolicitante && req.status==='open';

  const approve = () => {
    if(isGestor) {
      dispatch({type:'UPDATE',id:req.id,status:'pending_diretor',actor:user.name,
        label:'Aprovado pelo gestor — enviado para aprovação do diretor',comment});
      showToast('Aprovado e enviado ao diretor!','ok');
    } else if(isDiretor) {
      dispatch({type:'UPDATE',id:req.id,status:'pending_financeiro',actor:user.name,
        label:'Aprovado pelo diretor — enviado ao financeiro para revisão',comment});
      showToast('Aprovado e enviado ao financeiro!','ok');
    }
    onBack();
  };
  const reject = () => {
    if(!comment.trim())return;
    const who = isGestor?'gestor':isDiretor?'diretor':'financeiro';
    dispatch({type:'UPDATE',id:req.id,status:'open',actor:user.name,
      label:`Devolvido pelo ${who} — retornou ao solicitante`,comment});
    showToast('Solicitação devolvida ao solicitante.','err'); onBack();
  };
  const cancelReq = () => {
    dispatch({type:'UPDATE',id:req.id,status:'cancelled',actor:user.name,
      label:'Solicitação cancelada pelo solicitante',comment:''});
    showToast('Solicitação cancelada.','err'); onBack();
  };

  const t = req.totvs || {};
  const buildPayload = () => buildTotvsPayload(req);

  const callTotvs = async () => {
    setTotvsLoading('auth'); setTotvsResult(null);
    try {
      // 1. Busca token fresco (expira a cada 5h)
      const authBody = new URLSearchParams({
        Grant_type:    'password',
        Client_id:     'deepapiv2',
        Client_secret: '4270929817',
        Username:      'ECOMM',
        Password:      '1995',
      });
      const authRes = await fetch('https://www30.bhan.com.br:9443/api/totvsmoda/authorization/v2/token', {
        method: 'POST',
        headers: {'Content-Type':'application/x-www-form-urlencoded','Accept':'application/json'},
        body: authBody,
      });
      if(!authRes.ok) {
        const d = await authRes.json().catch(()=>({}));
        throw new Error(`Falha na autenticação (${authRes.status}): ${d.message||d.error||authRes.statusText}`);
      }
      const authData = await authRes.json();
      const token = authData.access_token || authData.token || authData.accessToken;
      if(!token) throw new Error('Token não encontrado na resposta de autenticação.');

      // 2. Envia duplicata com token fresco
      setTotvsLoading('sending');
      const res = await fetch(TOTVS_API, {
        method: 'POST',
        headers: {'Content-Type':'application/json','Accept':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify(buildPayload()),
      });
      if(res.ok){
        // Marca como enviado no banco e atualiza status automaticamente — sem segundo clique
        dispatch({type:'MARK_SENT', id:req.id});
        sbUpdate('requests',{sent_to_totvs:true},`?id=eq.${req.id}`).catch(()=>{});
        setTotvsLoading(false);
        finalizePay();
        return;
      } else {
        let msg=`Erro ${res.status}`;
        let detail='';
        try {
          const d=await res.json();
          if(Array.isArray(d))   msg = d[0]?.message || msg;
          else                   msg = d.message||d.title||d.detail||d.error||msg;
          if(d.errors)           detail=JSON.stringify(d.errors,null,2);
          else if(d.details)     detail=JSON.stringify(d.details,null,2);
          else if(typeof d==='object') detail=JSON.stringify(d,null,2);
        } catch{}
        setTotvsResult({ok:false, msg, detail});
      }
    } catch(e){
      const isCors = e.name==='TypeError'||e.message?.toLowerCase().includes('fetch')||e.message?.toLowerCase().includes('network');
      setTotvsResult({
        ok:false, cors:isCors,
        msg: isCors
          ? 'Não foi possível conectar ao servidor TOTVS (CORS/rede). Em produção, use um proxy reverso no Easypanel.'
          : e.message,
      });
    }
    setTotvsLoading(false);
  };

  const finalizePay = () => {
    dispatch({type:'UPDATE',id:req.id,status:'completed',actor:user.name,
      label:'Aprovado pelo financeiro — lançado no sistema de contas a pagar (TOTVS)',comment:''});
    showToast('Lançado no contas a pagar!','ok'); onBack();
  };

  const DOTS=['#C9BBAA','#8B7355','#3B82F6','#22C55E','#EF4444','#8B5CF6'];

  return (
    <div className="max-w-2xl fade">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-2 rounded-xl transition" style={{background:'#fff',border:'1px solid #EDE8E3'}} onMouseEnter={e=>e.currentTarget.style.borderColor='#C9BBAA'} onMouseLeave={e=>e.currentTarget.style.borderColor='#EDE8E3'}><I.back/></button>
        <div className="flex-1">
          <h1 className="text-xl font-bold" style={{color:'#1A1A1A'}}>Detalhes da Solicitação</h1>
        </div>
        <Badge status={req.status}/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        {/* Left: info + actions */}
        <div className="lg:col-span-2 space-y-4">
          <div className="rounded-2xl p-6" style={{background:'#fff',border:'1px solid #EDE8E3'}}>
            <h2 className="text-lg font-bold mb-5" style={{color:'#1A1A1A'}}>{req.title}</h2>
            <div className="grid grid-cols-2 gap-4 text-sm">
              {[['VALOR',<span style={{color:'#C9BBAA',fontWeight:700,fontSize:'18px'}}>{R(req.amount)}</span>],
                ['CATEGORIA',req.category],['SOLICITANTE',req.solicitanteName],['DATA',req.created_at]
              ].map(([l,v])=>(
                <div key={l}>
                  <p className="text-xs font-semibold mb-1" style={{color:'#AAA',letterSpacing:'0.07em'}}>{l}</p>
                  <div className="font-medium" style={{color:'#1A1A1A'}}>{v}</div>
                </div>
              ))}
            </div>
            <div className="mt-4 pt-4" style={{borderTop:'1px solid #F0EBE5'}}>
              <p className="text-xs font-semibold mb-1.5" style={{color:'#AAA',letterSpacing:'0.07em'}}>DESCRIÇÃO</p>
              <p className="text-sm leading-relaxed" style={{color:'#555'}}>{req.description}</p>
            </div>
          </div>

          {/* TOTVS data — read-only (apenas campos relevantes) */}
          {req.totvs && (
            <div className="rounded-2xl p-5" style={{background:'#fff',border:'1px solid #EDE8E3'}}>
              <div className="flex items-center gap-2 mb-4">
                <p className="text-xs font-bold" style={{color:'#AAA',letterSpacing:'0.07em'}}>INFORMAÇÕES FINANCEIRAS</p>
                <span className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:'#F7F3EE',color:'#C9BBAA'}}>TOTVS</span>
              </div>
              <div className="grid grid-cols-2 gap-x-4 gap-y-3">
                {[
                  ['Cód. Duplicata',   req.totvs.duplicateCode],
                  ['Parcelas',         `${req.totvs.parcelas||1}x de ${R((req.amount||0)/(req.totvs.parcelas||1))}`],
                  ['1º Vencimento',    req.totvs.dueDate],
                  ['Tipo Documento',   (()=>{ const d=DOCUMENT_TYPES.find(x=>x.v==req.totvs.document); return d?`${d.v} — ${d.l}`:'—'; })()],
                  ['Despesa',          (()=>{ const d=EXPENSE_TYPES.find(x=>x.v==req.totvs.expenseCode); return d?`${d.v} — ${d.l}`:(req.totvs.expenseCode||'—'); })()],
                  ['% Rateio',         (req.totvs.proratedPercentage||100)+'%'],
                ].map(([l,v])=>(
                  <div key={l}>
                    <p className="text-xs" style={{color:'#AAA'}}>{l}</p>
                    <p className="text-sm font-semibold mt-0.5" style={{color:'#1A1A1A'}}>{v||'—'}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Receipts */}
          {req.receipts.length>0&&(
            <div className="rounded-2xl p-5" style={{background:'#fff',border:'1px solid #EDE8E3'}}>
              <p className="text-xs font-semibold mb-3" style={{color:'#AAA',letterSpacing:'0.07em'}}>RECIBOS ANEXADOS ({req.receipts.length})</p>
              <div className="grid grid-cols-4 gap-2">
                {req.receipts.map((r,i)=>(
                  r.type?.startsWith('image')&&r.data?(
                    <div key={i} onClick={()=>setLightbox(r)} className="rounded-xl overflow-hidden cursor-pointer aspect-square hover:opacity-80 transition" style={{border:'1px solid #EDE8E3'}}>
                      <img src={r.data} alt="" className="w-full h-full object-cover"/>
                    </div>
                  ):(
                    <div key={i} className="rounded-xl aspect-square flex flex-col items-center justify-center gap-1 p-2" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
                      <span style={{color:'#C9BBAA'}}><I.file/></span>
                      <span className="text-xs text-center truncate w-full" style={{color:'#888',fontSize:'10px'}}>{r.name}</span>
                    </div>
                  )
                ))}
              </div>
            </div>
          )}

          {/* Actions — Gestor ou Diretor */}
          {(canActGestor||canActDiretor)&&(
            <div className="flex gap-2">
              <button onClick={()=>{setComment('');setModal('reject');}} className="flex-1 py-3 rounded-xl text-sm font-semibold transition-all active:scale-95" style={{border:'2px solid #FECACA',color:'#DC2626',background:'#FEF2F2'}} onMouseEnter={e=>e.currentTarget.style.background='#FEE2E2'} onMouseLeave={e=>e.currentTarget.style.background='#FEF2F2'}>

              </button>

                {isGestor?'Aprovar → Diretor':'Aprovar → Financeiro'}

          {/* Actions — Financeiro */}
          {canActFin&&(
            <div className="flex gap-2">

                setModal('payment');
                if(req.sent_to_totvs) setTotvsResult({ok:true, warn:true, msg:'Lançamento já registrado no TOTVS. Confirme para concluir.'});

            </div>

          {/* Actions — Solicitante (devolvido) */}

              <div className="flex items-start gap-2 text-sm" style={{color:'#92400E'}}>
                <svg width="16" height="16" className="flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" d="M12 8v4m0 4h.01"/></svg>
                <span>Sua solicitação foi devolvida. Veja o motivo no histórico, edite os dados e reenvie, ou cancele-a.</span>
              </div>
              <div className="flex gap-2">
                <button onClick={()=>{if(window.confirm('Cancelar esta solicitação definitivamente?'))cancelReq();}}

                  Cancelar

                <button onClick={()=>onEdit(req)}

                  style={{background:'#0A0A0A',color:'#C9BBAA'}}>
                  Editar e Reenviar
                </button>
              </div>
            </div>
          )}
        </div>

        {/* Right: history */}
        <div className="rounded-2xl p-5" style={{background:'#fff',border:'1px solid #EDE8E3'}}>
          <p className="text-xs font-semibold mb-4" style={{color:'#AAA',letterSpacing:'0.07em'}}>HISTÓRICO</p>
          <div className="space-y-0">
            {req.history.map((h,i)=>(
              <div key={i} className="flex gap-3">
                <div className="flex flex-col items-center">
                  <div className="w-2.5 h-2.5 rounded-full mt-1 flex-shrink-0" style={{background:DOTS[i%DOTS.length]}}/>
                  {i<req.history.length-1&&<div className="w-px flex-1 mt-1 mb-1" style={{background:'#F0EBE5'}}/>}
                </div>
                <div className="pb-4 flex-1">
                  <p className="text-xs font-semibold leading-snug" style={{color:'#1A1A1A'}}>{h.action}</p>
                  <p className="text-xs mt-0.5" style={{color:'#AAA'}}>{h.actor}</p>
                  <p className="text-xs mt-0.5" style={{color:'#C9BBAA'}}>{h.date}</p>
                  {h.comment&&<p className="text-xs mt-1.5 px-3 py-1.5 rounded-lg italic" style={{background:'#F7F3EE',color:'#666'}}>"{h.comment}"</p>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Lightbox */}
      {lightbox&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overlay" style={{background:'rgba(0,0,0,.9)'}} onClick={()=>setLightbox(null)}>
          <img src={lightbox.data} alt="" className="max-w-full max-h-full rounded-2xl"/>
        </div>
      )}

      {/* Modals */}
      {modal==='approve'&&(
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 overlay" style={{background:'rgba(0,0,0,.5)'}}>
          <div className="w-full max-w-sm rounded-2xl p-5 slide-up" style={{background:'#fff'}}>
            <p className="font-bold mb-1" style={{color:'#1A1A1A'}}>Confirmar Aprovação</p>
            <p className="text-sm mb-3" style={{color:'#888'}}>
              {isGestor?'A solicitação será enviada para o Diretor aprovar.':
               isDiretor?'A solicitação será enviada ao Financeiro para revisão.':'Confirmar aprovação.'}
            </p>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={2} placeholder="Comentário opcional..."
              className="w-full px-3 py-2 rounded-xl text-sm resize-none mb-3" style={{background:'#F7F6F3',border:'1px solid #E0D9D0',color:'#1A1A1A'}}/>
            <div className="flex gap-2">
              <button onClick={()=>setModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-medium" style={{border:'1px solid #E0D9D0',color:'#666'}}>Cancelar</button>
              <button onClick={approve} className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{background:'#0A0A0A',color:'#C9BBAA'}}>Aprovar</button>
            </div>
          </div>
        </div>
      )}

      {modal==='reject'&&(
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 overlay" style={{background:'rgba(0,0,0,.5)'}}>
          <div className="w-full max-w-sm rounded-2xl p-5 slide-up" style={{background:'#fff'}}>
            <p className="font-bold mb-1" style={{color:'#1A1A1A'}}>Devolver Solicitação</p>
            <p className="text-sm mb-3" style={{color:'#888'}}>Informe o motivo. A solicitação voltará ao solicitante.</p>
            <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={3} placeholder="Motivo obrigatório..."
              className="w-full px-3 py-2 rounded-xl text-sm resize-none mb-3" style={{background:'#F7F6F3',border:'1px solid #E0D9D0',color:'#1A1A1A'}}/>
            <div className="flex items-center gap-2 mb-3 px-3 py-2 rounded-xl text-xs" style={{background:'#FFF7ED',border:'1px solid #FED7AA',color:'#C2410C'}}>
              <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path strokeLinecap="round" d="M12 8v4m0 4h.01"/></svg>
              O solicitante verá o motivo e poderá editar e reenviar.
            </div>
            <div className="flex gap-2">
              <button onClick={()=>setModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-medium" style={{border:'1px solid #E0D9D0',color:'#666'}}>Cancelar</button>
              <button onClick={()=>{if(comment.trim())reject();}}
                className="flex-1 py-2.5 rounded-xl text-sm font-semibold transition"
                style={{background:comment.trim()?'#DC2626':'#FCA5A5',color:'#fff',cursor:comment.trim()?'pointer':'not-allowed'}}>
                Devolver
              </button>
            </div>
          </div>
        </div>
      )}

      {modal==='payment'&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center p-3 overlay" style={{background:'rgba(0,0,0,.65)'}}>
          <div className="w-full max-w-lg rounded-2xl slide-up flex flex-col" style={{background:'#fff',maxHeight:'92vh'}}>

            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid #EDE8E3'}}>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background:'#0A0A0A'}}>
                  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#C9BBAA" strokeWidth="2"><path strokeLinecap="round" d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
                </div>
                <div>
                  <p className="font-bold text-sm" style={{color:'#1A1A1A'}}>Confirmar Lançamento</p>
                  <p className="text-xs" style={{color:'#AAA'}}>API TOTVS Moda · FCPFM004</p>
                </div>
              </div>
              <button onClick={()=>{setModal(null);setTotvsResult(null);}} className="w-8 h-8 rounded-xl flex items-center justify-center transition hover:bg-gray-100" style={{color:'#AAA',fontSize:'18px'}}>✕</button>
            </div>

            {/* Body */}
            <div className="overflow-y-auto flex-1 p-5 space-y-4">

              {/* Resumo da solicitação */}
              <div className="rounded-xl p-3 grid grid-cols-3 gap-3 text-xs" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
                <div><p style={{color:'#AAA'}}>Solicitante</p><p className="font-semibold mt-0.5" style={{color:'#1A1A1A'}}>{req.solicitanteName}</p></div>
                <div><p style={{color:'#AAA'}}>Valor</p><p className="font-bold mt-0.5" style={{color:'#C9BBAA',fontSize:'15px'}}>{R(req.amount)}</p></div>
                <div><p style={{color:'#AAA'}}>Categoria</p><p className="font-semibold mt-0.5" style={{color:'#1A1A1A'}}>{req.category}</p></div>
              </div>

              {/* Dados TOTVS — resumo */}
              <div className="rounded-xl p-3.5 text-xs space-y-2" style={{background:'#FAFAF8',border:'1px solid #EDE8E3'}}>
                <div className="grid grid-cols-2 gap-x-4 gap-y-2">
                  <div><span style={{color:'#AAA'}}>Cód. Duplicata: </span><span className="font-semibold" style={{color:'#1A1A1A'}}>{t.duplicateCode||'—'}</span></div>
                  <div><span style={{color:'#AAA'}}>Parcelas: </span><span className="font-semibold" style={{color:'#C9BBAA'}}>{t.parcelas||1}x de {R((req.amount||0)/(t.parcelas||1))}</span></div>
                  <div><span style={{color:'#AAA'}}>1º Vencimento: </span><span className="font-semibold" style={{color:'#1A1A1A'}}>{t.dueDate||'—'}</span></div>
                  <div><span style={{color:'#AAA'}}>Tipo Doc.: </span><span className="font-semibold" style={{color:'#1A1A1A'}}>{(DOCUMENT_TYPES.find(d=>d.v==t.document)||{}).l||t.document||'—'}</span></div>
                  <div><span style={{color:'#AAA'}}>Despesa: </span><span className="font-semibold" style={{color:'#1A1A1A'}}>{(()=>{ const d=EXPENSE_TYPES.find(x=>x.v==t.expenseCode); return d?`${d.v} — ${d.l}`:(t.expenseCode||'—'); })()}</span></div>
                  <div><span style={{color:'#AAA'}}>% Rateio: </span><span className="font-semibold" style={{color:'#1A1A1A'}}>{t.proratedPercentage||100}%</span></div>
                </div>
                {t.observation&&<div style={{borderTop:'1px solid #EDE8E3',paddingTop:'8px'}}><span style={{color:'#AAA'}}>Observação: </span><span style={{color:'#555'}}>{t.observation}</span></div>}
              </div>


              {/* Resultado */}
              {totvsResult && (
                <div className="rounded-xl p-3.5" style={{
                  background: totvsResult.ok ? (totvsResult.warn?'#FFFBEB':'#F0FDF4') : '#FEF2F2',
                  border: `1px solid ${totvsResult.ok ? (totvsResult.warn?'#FDE68A':'#BBF7D0') : '#FECACA'}`
                }}>
                  <p className="text-sm font-semibold" style={{color:totvsResult.ok?(totvsResult.warn?'#92400E':'#15803D'):'#DC2626'}}>{totvsResult.msg}</p>
                  {totvsResult.cors && (
                    <p className="text-xs mt-1.5" style={{color:'#DC2626',opacity:.8}}>
                      ℹ️ Em produção, configure um proxy no Easypanel: <code>/api/totvs</code> → <code>https://www30.bhan.com.br:9443</code>
                    </p>
                  )}
                  {totvsResult.detail && (
                    <details className="mt-2">
                      <summary className="text-xs cursor-pointer font-semibold" style={{color:'#DC2626'}}>VER DETALHE DO ERRO ▸</summary>
                      <pre className="mt-1.5 p-2 rounded-lg text-xs overflow-x-auto whitespace-pre-wrap" style={{background:'#fff0f0',color:'#991B1B',maxHeight:'160px'}}>
                        {totvsResult.detail}
                      </pre>
                    </details>
                  )}
                  {totvsResult.ok && (
                    <p className="text-xs mt-1.5" style={{color:'#15803D',opacity:.8}}>Clique em "Confirmar" para atualizar o status da solicitação.</p>
                  )}
                </div>
              )}

            </div>

            {/* Footer */}
            <div className="px-5 py-4 flex gap-2" style={{borderTop:'1px solid #EDE8E3'}}>
              <button onClick={()=>{setModal(null);setTotvsResult(null);}} className="flex-1 py-2.5 rounded-xl text-sm font-medium transition"
                style={{border:'1px solid #E0D9D0',color:'#666'}}>
                Cancelar
              </button>
              {!totvsResult?.ok && (
                <button onClick={callTotvs} disabled={!!totvsLoading}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all active:scale-95 disabled:opacity-60"
                  style={{background:'#0A0A0A',color:'#C9BBAA'}}>
                  {totvsLoading==='auth'
                    ? <><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#C9BBAA" strokeWidth="3" strokeDasharray="60" strokeDashoffset="15"/></svg>Autenticando...</>
                    : totvsLoading==='sending'
                    ? <><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#C9BBAA" strokeWidth="3" strokeDasharray="60" strokeDashoffset="15"/></svg>Enviando para TOTVS...</>
                    : <><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>Lançar no Sistema</>
                  }
                </button>
              )}
              {totvsResult?.ok && (
                <button onClick={finalizePay}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all active:scale-95"
                  style={{background:'#15803D',color:'#fff'}}>
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" d="M5 13l4 4L19 7"/></svg>
                  Confirmar e Fechar
                </button>
              )}
            </div>

          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════ SOLICITAÇÕES LIST ═══════════════════════ */
function SolicitacoesView({ user, requests, onSelect, onNew, dispatch, showToast }) {
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [bulkLoading,setBulkLoading]=useState(false);
  const [bulkProgress,setBulkProgress]=useState(null);

  const isGestorList    = user.role==='gestor';
  const isDiretorList   = user.role==='diretor';
  const isFinanceiroList = user.role==='financeiro';

  let base = requests;
  if(user.role==='solicitante')  base=requests.filter(r=>r.solicitanteId===user.id);
  if(user.role==='diretor')      base=requests.filter(r=>r.status!=='pending_gestor'||r.solicitanteId===user.id);
  if(user.role==='financeiro')   base=requests.filter(r=>['pending_financeiro','completed','cancelled','open'].includes(r.status)||r.solicitanteId===user.id);

  const filtered = base
    .filter(r=>filter==='all'||r.status===filter)
    .filter(r=>!search||r.title.toLowerCase().includes(search.toLowerCase())||(r.solicitanteName||'').toLowerCase().includes(search.toLowerCase()));

  // Quais linhas podem ser selecionadas
  const canSelect = r => (isGestorList&&r.status==='pending_gestor')||(isDiretorList&&r.status==='pending_diretor');
  const eligible  = filtered.filter(canSelect);
  const allSelected = eligible.length>0 && eligible.every(r=>selected.has(r.id));

  const toggleRow = id => setSelected(p=>{ const s=new Set(p); s.has(id)?s.delete(id):s.add(id); return s; });
  const toggleAll = () => setSelected(allSelected ? new Set() : new Set(eligible.map(r=>r.id)));

  /* ── Aprovação em lote: gestor → diretor ── */
  const bulkApproveGestor = () => {
    if(!window.confirm(`Aprovar ${selected.size} solicitação${selected.size!==1?'ões':''} e enviar ao diretor?`)) return;
    for(const id of [...selected]){
      dispatch({type:'UPDATE',id,status:'pending_diretor',actor:user.name,label:'Aprovado em lote pelo gestor — enviado ao diretor',comment:''});
    }
    showToast(`${selected.size} solicitação${selected.size!==1?'ões':''} aprovada${selected.size!==1?'s':''}!`);
    setSelected(new Set());
  };

  /* ── Aprovação em lote: diretor → financeiro ── */
  const bulkApproveDiretor = () => {
    if(!window.confirm(`Aprovar ${selected.size} solicitação${selected.size!==1?'ões':''} e enviar ao financeiro?`)) return;
    for(const id of [...selected]){
      dispatch({type:'UPDATE',id,status:'pending_financeiro',actor:user.name,label:'Aprovado em lote pelo diretor — enviado ao financeiro',comment:''});
    }
    showToast(`${selected.size} solicitação${selected.size!==1?'ões':''} aprovada${selected.size!==1?'s':''}!`);
    setSelected(new Set());
  };

  const FILTERS = [
    {v:'all',l:'Todas'},
    ...(isGestorList?[{v:'pending_gestor',l:'Para Revisar'}]:[]),
    ...(isDiretorList?[{v:'pending_diretor',l:'Para Aprovar'}]:[]),
    ...(isFinanceiroList?[{v:'pending_financeiro',l:'Para Finalizar'}]:[]),
    {v:'open',l:'Devolvidas'},
    {v:'pending_financeiro',l:'No Financeiro'},
    {v:'completed',l:'Concluídas'},
    {v:'cancelled',l:'Canceladas'},
  ].filter((f,i,arr)=>arr.findIndex(x=>x.v===f.v)===i); // deduplica

  return (
    <div className="fade">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-xl font-bold" style={{color:'#1A1A1A'}}>Solicitações</h1>
          <p className="text-sm mt-0.5" style={{color:'#888'}}>{filtered.length} registro{filtered.length!==1?'s':''} encontrado{filtered.length!==1?'s':''}</p>
        </div>
        <button onClick={onNew} className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-95" style={{background:'#0A0A0A',color:'#C9BBAA'}}>
          <I.plus/> Nova
        </button>
      </div>

      {/* Search + Filters */}
      <div className="flex flex-col sm:flex-row gap-3 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por título ou solicitante..."
          className="flex-1 px-4 py-2.5 rounded-xl text-sm" style={{background:'#fff',border:'1px solid #E0D9D0',color:'#1A1A1A'}}
          onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}/>
        <div className="flex gap-1.5 flex-wrap">
          {FILTERS.map(f=>(
            <button key={f.v} onClick={()=>setFilter(f.v)}
              className="px-3 py-1.5 rounded-xl text-xs font-semibold transition whitespace-nowrap"
              style={{background:filter===f.v?'#0A0A0A':'#fff',color:filter===f.v?'#C9BBAA':'#888',border:`1px solid ${filter===f.v?'#0A0A0A':'#E0D9D0'}`}}>
              {f.l}
            </button>
          ))}
        </div>
      </div>

      {/* Table header (desktop) */}
      <div className="hidden md:grid gap-3 px-4 py-2 mb-1 text-xs font-bold" style={{color:'#AAA',letterSpacing:'0.07em',gridTemplateColumns:(isGestorList||isDiretorList)?'24px 1fr 1fr 1fr auto auto 24px':'1fr 1fr 1fr auto auto 24px'}}>
        {(isGestorList||isDiretorList)&&(
          <input type="checkbox" checked={allSelected} onChange={toggleAll} style={{accentColor:'#0A0A0A',cursor:'pointer'}} title="Selecionar todas elegíveis"/>
        )}
        <div>TÍTULO</div>
        <div>SOLICITANTE</div>
        <div>CATEGORIA</div>
        <div className="text-right">VALOR</div>
        <div className="text-center">STATUS</div>
        <div/>
      </div>

      {/* Rows */}
      {filtered.length===0?(
        <div className="rounded-2xl p-12 text-center" style={{background:'#fff',border:'1px solid #EDE8E3'}}>
          <svg width="36" height="36" className="mx-auto mb-3" fill="none" viewBox="0 0 24 24" style={{color:'#E0D9D0'}}>
            <path d="M9 12h6m-6 4h6M9 8h3M5 3h11l3 3v15a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <p className="text-sm font-medium" style={{color:'#AAA'}}>Nenhuma solicitação encontrada</p>
        </div>
      ):(
        <div className="space-y-1.5">
          {filtered.map(r=>(
            <div key={r.id}
              className="rounded-xl transition-all"
              style={{background: selected.has(r.id)?'#FAFAF7':'#fff', border:`1px solid ${selected.has(r.id)?'#C9BBAA':'#EDE8E3'}`}}
              onMouseEnter={e=>{if(!selected.has(r.id)){e.currentTarget.style.borderColor='#C9BBAA';e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,.06)'}}}
              onMouseLeave={e=>{if(!selected.has(r.id)){e.currentTarget.style.borderColor='#EDE8E3';e.currentTarget.style.boxShadow='none'}}}>
              {/* Desktop row */}
              <div className="hidden md:grid gap-3 px-4 py-3.5 items-center"
                style={{gridTemplateColumns:(isGestorList||isDiretorList)?'24px 1fr 1fr 1fr auto auto 24px':'1fr 1fr 1fr auto auto 24px'}}>
                {(isGestorList||isDiretorList)&&(
                  <input type="checkbox"
                    checked={selected.has(r.id)}
                    disabled={!canSelect(r)}
                    onChange={e=>{e.stopPropagation();toggleRow(r.id);}}
                    onClick={e=>e.stopPropagation()}
                    style={{accentColor:'#0A0A0A',cursor:canSelect(r)?'pointer':'default',opacity:canSelect(r)?1:0.25}}/>
                )}
                <div className="cursor-pointer" onClick={()=>onSelect(r.id)}>
                  <p className="text-sm font-semibold truncate" style={{color:'#1A1A1A'}}>{r.title}</p>
                  <p className="text-xs" style={{color:'#AAA'}}>{r.created_at}</p>
                </div>
                <div className="text-sm truncate cursor-pointer" style={{color:'#666'}} onClick={()=>onSelect(r.id)}>{r.solicitanteName}</div>
                <div className="text-sm truncate cursor-pointer" style={{color:'#666'}} onClick={()=>onSelect(r.id)}>{r.category}</div>
                <div className="text-right text-sm font-bold cursor-pointer" style={{color:'#C9BBAA'}} onClick={()=>onSelect(r.id)}>{R(r.amount)}</div>
                <div className="flex justify-center cursor-pointer" onClick={()=>onSelect(r.id)}><Badge status={r.status}/></div>
                <div className="flex justify-end cursor-pointer" style={{color:'#CCC'}} onClick={()=>onSelect(r.id)}><I.chevron/></div>
              </div>
              {/* Mobile card */}
              <div className="md:hidden p-4 flex gap-3 items-start" onClick={()=>onSelect(r.id)}>
                {(isGestorList||isDiretorList)&&canSelect(r)&&(
                  <input type="checkbox" checked={selected.has(r.id)}
                    onChange={e=>{e.stopPropagation();toggleRow(r.id);}}
                    onClick={e=>e.stopPropagation()}
                    style={{accentColor:'#0A0A0A',marginTop:'3px',flexShrink:0}}/>
                )}
                <div className="flex-1 min-w-0">
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <p className="text-sm font-semibold" style={{color:'#1A1A1A'}}>{r.title}</p>
                    <span className="text-sm font-bold flex-shrink-0" style={{color:'#C9BBAA'}}>{R(r.amount)}</span>
                  </div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <Badge status={r.status}/>
                    <span className="text-xs" style={{color:'#AAA'}}>{r.category} · {r.solicitanteName}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Barra flutuante de aprovação em lote */}
      {selected.size>0&&(
        <div className="fixed bottom-6 left-1/2 z-50 fade flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl"
          style={{transform:'translateX(-50%)',background:'#0A0A0A',border:'1px solid #2A2A2A'}}>
          <span className="text-sm font-semibold" style={{color:'#C9BBAA'}}>
            {selected.size} selecionada{selected.size!==1?'s':''}
          </span>
          <div className="w-px h-4 flex-shrink-0" style={{background:'#333'}}/>
          <button
            onClick={isGestorList?bulkApproveGestor:bulkApproveDiretor}
            disabled={bulkLoading}
            className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all active:scale-95 disabled:opacity-60"
            style={{background:'#C9BBAA',color:'#0A0A0A'}}>
            {bulkLoading
              ? <><svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#0A0A0A" strokeWidth="3" strokeDasharray="60" strokeDashoffset="15"/></svg>
                  Processando...</>
              : <><I.check/> Aprovar {selected.size}</>
            }
          </button>
          <button onClick={()=>setSelected(new Set())} disabled={bulkLoading}
            className="text-xs px-3 py-2 rounded-xl transition disabled:opacity-40"
            style={{color:'#666'}}>
            Cancelar
          </button>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════ ADMIN VIEW ═══════════════════════ */
function AdminView({ showToast }) {
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null); // null | 'new' | user_object
  const [saving,setSaving]=useState(false);

  const load = async () => {
    setLoading(true);
    try { setUsers(await sbSelect('profiles','?order=created_at.asc')||[]); }
    catch(e){ showToast('Erro ao carregar usuários','err'); }
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const toggleActive = async (u) => {
    try {
      await sbUpdate('profiles',{is_active:!u.is_active},`?id=eq.${u.id}`);
      setUsers(p=>p.map(x=>x.id===u.id?{...x,is_active:!x.is_active}:x));
      showToast(u.is_active?'Usuário desativado':'Usuário reativado');
    } catch{ showToast('Erro ao atualizar','err'); }
  };

  const deleteUser = async (u) => {
    if(!confirm(`Excluir ${u.name}?`)) return;
    try {
      await sbDelete('profiles',`?id=eq.${u.id}`);
      setUsers(p=>p.filter(x=>x.id!==u.id));
      showToast('Usuário removido');
    } catch{ showToast('Erro ao remover','err'); }
  };

  const ROLE_COLOR = {admin:'#8B5CF6',gestor:'#3B82F6',diretor:'#F59E0B',financeiro:'#22C55E',solicitante:'#888'};

  return (
    <div className="fade">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-xl font-bold" style={{color:'#1A1A1A'}}>Usuários</h1>
          <p className="text-sm mt-0.5" style={{color:'#888'}}>{users.length} usuário{users.length!==1?'s':''} cadastrado{users.length!==1?'s':''}</p>
        </div>
        <button onClick={()=>setModal('new')}
          className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-95"
          style={{background:'#0A0A0A',color:'#C9BBAA'}}>
          <I.plus/> Novo Usuário
        </button>
      </div>

      {loading?(
        <div className="flex items-center justify-center py-16"><Spinner/></div>
      ):(
        <div className="space-y-2">
          {users.map(u=>(
            <div key={u.id} className="rounded-xl px-5 py-4 flex items-center gap-4"
              style={{background:'#fff',border:'1px solid #EDE8E3',opacity:u.is_active?1:0.55}}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0"
                style={{background:'rgba(201,187,170,.15)',color:'#C9BBAA'}}>
                {u.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
              </div>
              <div className="flex-1 min-w-0">
                <p className="font-semibold text-sm" style={{color:'#1A1A1A'}}>{u.name}</p>
                <p className="text-xs" style={{color:'#AAA'}}>{u.email}</p>
              </div>
              <div className="flex items-center gap-3 flex-shrink-0">
                <span className="text-xs font-bold px-2.5 py-1 rounded-full"
                  style={{background:`${ROLE_COLOR[u.role]}18`,color:ROLE_COLOR[u.role]}}>
                  {ROLE_LABELS[u.role]}
                </span>
                {(u.allowed_expense_codes?.length>0||u.allowed_document_types?.length>0)&&(
                  <span className="text-xs px-2 py-0.5 rounded-full" style={{background:'#FEF3E2',color:'#B45309'}}>Restrito</span>
                )}
                <button onClick={()=>setModal(u)} className="text-xs px-3 py-1.5 rounded-lg transition"
                  style={{background:'#F5F0EB',color:'#888'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#EDE8E3'} onMouseLeave={e=>e.currentTarget.style.background='#F5F0EB'}>
                  Editar
                </button>
                <button onClick={()=>toggleActive(u)} className="text-xs px-3 py-1.5 rounded-lg transition"
                  style={{background:u.is_active?'#FEF2F2':'#F0FDF4',color:u.is_active?'#DC2626':'#15803D'}}>
                  {u.is_active?'Desativar':'Ativar'}
                </button>
              </div>
            </div>
          ))}
          {!users.length&&<div className="rounded-xl p-12 text-center" style={{background:'#fff',border:'1px solid #EDE8E3'}}><p className="text-sm" style={{color:'#AAA'}}>Nenhum usuário cadastrado</p></div>}
        </div>
      )}

      {/* Modal criar/editar */}
      {modal&&<UserModal
        user={modal==='new'?null:modal}
        onClose={()=>setModal(null)}
        onSave={async (data)=>{
          setSaving(true);
          try {
            if(modal==='new'){
              const [row]=await sbInsert('profiles',{
                name:data.name,email:data.email,password:data.password,
                role:data.role,
                allowed_expense_codes:data.allowed_expense_codes,
                allowed_document_types:data.allowed_document_types,
              });
              setUsers(p=>[...p,row]);
              showToast('Usuário criado com sucesso!');
            } else {
              const payload={name:data.name,email:data.email,role:data.role,
                allowed_expense_codes:data.allowed_expense_codes,
                allowed_document_types:data.allowed_document_types};
              if(data.password) payload.password=data.password;
              await sbUpdate('profiles',payload,`?id=eq.${modal.id}`);
              setUsers(p=>p.map(x=>x.id===modal.id?{...x,...payload}:x));
              showToast('Usuário atualizado!');
            }
            setModal(null);
          } catch(e){ showToast(e.message||'Erro ao salvar','err'); }
          setSaving(false);
        }}
        saving={saving}
      />}
    </div>
  );
}

/* ═══════════════════════ USER MODAL ═══════════════════════ */
function UserModal({ user, onClose, onSave, saving }) {
  const [name,setName]   = useState(user?.name||'');
  const [email,setEmail] = useState(user?.email||'');
  const [pw,setPw]       = useState('');
  const [role,setRole]   = useState(user?.role||'solicitante');
  const [restrictExp,setRestrictExp] = useState((user?.allowed_expense_codes?.length||0)>0);
  const [selExp,setSelExp] = useState(new Set(user?.allowed_expense_codes||[]));
  const [restrictDoc,setRestrictDoc] = useState((user?.allowed_document_types?.length||0)>0);
  const [selDoc,setSelDoc] = useState(new Set(user?.allowed_document_types||[]));
  const [expSearch,setExpSearch] = useState('');
  const [tab,setTab] = useState('info'); // 'info' | 'exp' | 'doc'

  const toggleExp = v => setSelExp(p=>{ const s=new Set(p); s.has(v)?s.delete(v):s.add(v); return s; });
  const toggleDoc = v => setSelDoc(p=>{ const s=new Set(p); s.has(v)?s.delete(v):s.add(v); return s; });

  const submit = () => {
    if(!name.trim()||!email.trim()){alert('Nome e email obrigatórios');return;}
    if(!user&&!pw.trim()){alert('Senha obrigatória para novo usuário');return;}
    onSave({
      name:name.trim(), email:email.trim().toLowerCase(), password:pw,
      role,
      allowed_expense_codes: restrictExp?[...selExp]:[],
      allowed_document_types: restrictDoc?[...selDoc]:[],
    });
  };

  const filteredExp = EXPENSE_TYPES.filter(e=>
    !expSearch || e.l.toLowerCase().includes(expSearch.toLowerCase()) || String(e.v).includes(expSearch));

  const inp = 'w-full px-3 py-2.5 rounded-xl text-sm';
  const is  = {background:'#FAFAF8',border:'1px solid #E0D9D0',color:'#1A1A1A'};
  const Lbl = ({c})=><label className="block text-xs font-semibold mb-1.5" style={{color:'#888',letterSpacing:'0.06em'}}>{c}</label>;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overlay" style={{background:'rgba(0,0,0,.5)'}}>
      <div className="w-full max-w-lg rounded-2xl slide-up flex flex-col" style={{background:'#fff',maxHeight:'90vh'}}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid #EDE8E3'}}>
          <p className="font-bold" style={{color:'#1A1A1A'}}>{user?'Editar Usuário':'Novo Usuário'}</p>
          <button onClick={onClose} className="w-8 h-8 rounded-xl flex items-center justify-center text-lg hover:bg-gray-100" style={{color:'#AAA'}}>✕</button>
        </div>

        {/* Tabs */}
        <div className="flex px-5 pt-4 gap-1">
          {[['info','Dados'],['exp','Despesas'],['doc','Documentos']].map(([id,l])=>(
            <button key={id} onClick={()=>setTab(id)}
              className="px-4 py-1.5 rounded-lg text-xs font-semibold transition"
              style={{background:tab===id?'#0A0A0A':'#F5F0EB',color:tab===id?'#C9BBAA':'#888'}}>
              {l}{id==='exp'&&restrictExp&&selExp.size>0&&<span className="ml-1 text-xs opacity-70">({selExp.size})</span>}
              {id==='doc'&&restrictDoc&&selDoc.size>0&&<span className="ml-1 text-xs opacity-70">({selDoc.size})</span>}
            </button>
          ))}
        </div>

        {/* Body */}
        <div className="overflow-y-auto flex-1 px-5 pb-4 pt-4 space-y-3">
          {tab==='info'&&(<>
            <div className="grid grid-cols-2 gap-3">
              <div><Lbl c="NOME"/><input value={name} onChange={e=>setName(e.target.value)} className={inp} style={is} onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}/></div>
              <div><Lbl c="FUNÇÃO"/>
                <select value={role} onChange={e=>setRole(e.target.value)} className={inp} style={{...is,appearance:'none'}} onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}>
                  {Object.entries(ROLE_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
            </div>
            <div><Lbl c="EMAIL"/><input type="email" value={email} onChange={e=>setEmail(e.target.value)} className={inp} style={is} onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}/></div>
            <div><Lbl c={user?'NOVA SENHA (deixe em branco para não alterar)':'SENHA'}/>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={user?'••••••':''} className={inp} style={is} onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}/></div>
          </>)}

          {tab==='exp'&&(<>
            <div className="flex items-center justify-between p-3 rounded-xl" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
              <div>
                <p className="text-sm font-semibold" style={{color:'#1A1A1A'}}>Restringir códigos de despesa</p>
                <p className="text-xs mt-0.5" style={{color:'#AAA'}}>Desativado = todas liberadas</p>
              </div>
              <button onClick={()=>setRestrictExp(p=>!p)}
                className="w-11 h-6 rounded-full transition-all relative"
                style={{background:restrictExp?'#0A0A0A':'#E0D9D0'}}>
                <span className="absolute top-1 w-4 h-4 bg-white rounded-full transition-all shadow-sm"
                  style={{left:restrictExp?'calc(100% - 20px)':'4px'}}/>
              </button>
            </div>
            {restrictExp&&(<>
              <input value={expSearch} onChange={e=>setExpSearch(e.target.value)} placeholder="Buscar despesa..."
                className={inp} style={{...is,marginBottom:'4px'}} onFocus={e=>e.target.style.borderColor='#C9BBAA'} onBlur={e=>e.target.style.borderColor='#E0D9D0'}/>
              <div className="rounded-xl overflow-y-auto space-y-0.5" style={{maxHeight:'220px',border:'1px solid #EDE8E3'}}>
                {filteredExp.map(e=>(
                  <label key={e.v} className="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-gray-50 transition">
                    <input type="checkbox" checked={selExp.has(e.v)} onChange={()=>toggleExp(e.v)}
                      className="rounded" style={{accentColor:'#0A0A0A'}}/>
                    <span className="text-xs" style={{color:'#1A1A1A'}}><span style={{color:'#AAA',marginRight:'4px'}}>{e.v}</span>{e.l}</span>
                  </label>
                ))}
              </div>
              <p className="text-xs text-right" style={{color:'#AAA'}}>{selExp.size} selecionado{selExp.size!==1?'s':''}</p>
            </>)}
          </>)}

          {tab==='doc'&&(<>
            <div className="flex items-center justify-between p-3 rounded-xl" style={{background:'#F7F3EE',border:'1px solid #EDE8E3'}}>
              <div>
                <p className="text-sm font-semibold" style={{color:'#1A1A1A'}}>Restringir tipos de documento</p>
                <p className="text-xs mt-0.5" style={{color:'#AAA'}}>Desativado = todos liberados</p>
              </div>
              <button onClick={()=>setRestrictDoc(p=>!p)}
                className="w-11 h-6 rounded-full transition-all relative"
                style={{background:restrictDoc?'#0A0A0A':'#E0D9D0'}}>
                <span className="absolute top-1 w-4 h-4 bg-white rounded-full transition-all shadow-sm"
                  style={{left:restrictDoc?'calc(100% - 20px)':'4px'}}/>
              </button>
            </div>
            {restrictDoc&&(
              <div className="rounded-xl overflow-y-auto space-y-0.5" style={{maxHeight:'260px',border:'1px solid #EDE8E3'}}>
                {DOCUMENT_TYPES.map(d=>(
                  <label key={d.v} className="flex items-center gap-3 px-3 py-2 cursor-pointer hover:bg-gray-50 transition">
                    <input type="checkbox" checked={selDoc.has(d.v)} onChange={()=>toggleDoc(d.v)}
                      style={{accentColor:'#0A0A0A'}}/>
                    <span className="text-xs" style={{color:'#1A1A1A'}}><span style={{color:'#AAA',marginRight:'4px'}}>{d.v}</span>{d.l}</span>
                  </label>
                ))}
              </div>
            )}
          </>)}
        </div>

        {/* Footer */}
        <div className="px-5 py-4 flex gap-2" style={{borderTop:'1px solid #EDE8E3'}}>
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl text-sm font-medium"
            style={{border:'1px solid #E0D9D0',color:'#666'}}>Cancelar</button>
          <button onClick={submit} disabled={saving}
            className="flex-1 py-2.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 disabled:opacity-60"
            style={{background:'#0A0A0A',color:'#C9BBAA'}}>
            {saving?<><Spinner/>Salvando...</>:'Salvar'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════ APP ═══════════════════════ */
function App() {
  const [user,setUser]=useState(null);
  const [view,setView]=useState('dashboard');
  const [selected,setSelected]=useState(null);
  const [editingReq,setEditingReq]=useState(null);
  const [toast,setToast]=useState(null);
  const [menuOpen,setMenuOpen]=useState(false);
  const [appLoading,setAppLoading]=useState(false);
  const [requests,dispatch]=useReducer(reducer,[]);

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const loadRequests = async () => {
    setAppLoading(true);
    try {
      const rows = await sbSelect('requests','?order=created_at.desc')||[];
      const normalized = rows.map(r=>({
        ...r,
        solicitanteId:   r.solicitante_id||'',
        solicitanteName: r.solicitante_name||r.created_by||'',
        created_at: r.created_at
          ? new Date(r.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
          : '',
        receipts: r.receipts||[],
        history:  r.history||[],
        totvs:    r.totvs||{},
      }));
      dispatch({type:'SET', reqs: normalized});
    } catch(e){ showToast('Aviso: nao foi possivel carregar do banco','err'); }
    setAppLoading(false);
  };

  const handleLogin = async (u) => {
    setUser(u);
    setView(u.role==='solicitante'?'requests':'dashboard');
    await loadRequests();
  };

  const handleUpdate = async (updatedReq) => {
    // Atualiza campos editáveis no state local
    dispatch({type:'EDIT_FIELDS', id:updatedReq.id, fields:{
      title:updatedReq.title, description:updatedReq.description,
      amount:updatedReq.amount, category:updatedReq.category,
      totvs:updatedReq.totvs, receipts:updatedReq.receipts,
      status:'pending_gestor', history:updatedReq.history,
    }});
    setEditingReq(null);
    setView('requests');
    showToast('Solicitação reenviada para o gestor!');
    try {
      await sbUpdate('requests',{
        title:updatedReq.title, description:updatedReq.description,
        amount:updatedReq.amount, category:updatedReq.category,
        totvs:updatedReq.totvs, receipts:updatedReq.receipts,
        status:'pending_gestor', history:updatedReq.history,
        updated_at:new Date().toISOString(),
      },`?id=eq.${updatedReq.id}`);
    } catch(e){ showToast('Aviso: erro ao salvar no banco','err'); }
  };

  const handleSubmit = async (req) => {
    dispatch({type:'ADD',req});
    setView('requests');
    showToast('Solicitação enviada para o gestor!');
    try {
      await sbInsert('requests',{
        id:req.id, title:req.title,
        description:req.description||'', amount:req.amount,
        category:req.category||'', status:req.status,
        created_by:req.solicitanteName,
        solicitante_id:req.solicitanteId,
        solicitante_name:req.solicitanteName,
        history:req.history, totvs:req.totvs,
        receipts:(req.receipts||[]).map(r=>({name:r.name,type:r.type,data:r.data})),
        sent_to_totvs:false,
      });
    } catch(e){ showToast('Aviso: erro ao salvar no banco','err'); }
  };

  const syncDispatch = async (action) => {
    dispatch(action);
    if(action.type==='UPDATE'){
      try {
        const cur = requests.find(r=>r.id===action.id);
        const newHist = [...(cur?.history||[]),{
          date:fmtDate(), actor:action.actor, action:action.label, comment:action.comment||''
        }];
        await sbUpdate('requests',{
          status:action.status, history:newHist,
          updated_at:new Date().toISOString(),
        },`?id=eq.${action.id}`);
      } catch(e){ console.warn('Supabase sync:',e); }
    }
  };

  if(!user) return <LoginPage onLogin={handleLogin}/>;

  const selectedReq = requests.find(r=>r.id===selected);
  const toastStyle  = toast?.type==='ok' ? {background:'#0A0A0A',color:'#C9BBAA'} : {background:'#DC2626',color:'#fff'};

  return (
    <div className="min-h-screen" style={{background:'#F2F0EB'}}>
      <Sidebar user={user} view={view} setView={setView}
        onLogout={()=>{setUser(null);dispatch({type:'SET',reqs:[]});}}
        onNewRequest={()=>setView('new')} mobileOpen={menuOpen} onClose={()=>setMenuOpen(false)}/>

      <div className="md:hidden fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-4 py-3"
        style={{background:'#0A0A0A',borderBottom:'1px solid #1A1A1A'}}>
        <button onClick={()=>setMenuOpen(true)} style={{color:'#C9BBAA'}}><I.menu/></button>
        <span style={{fontFamily:'Raleway,sans-serif',fontWeight:200,letterSpacing:'0.4em',color:'#C9BBAA',fontSize:'16px'}}>DEEP</span>
        <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
          style={{background:'rgba(201,187,170,.2)',color:'#C9BBAA'}}>
          {user.name.split(' ').map(w=>w[0]).slice(0,2).join('')}
        </div>
      </div>

      <main className="md:ml-56 pt-14 md:pt-0">
        <div className="max-w-5xl mx-auto px-4 md:px-8 py-6 md:py-8">

          {toast&&(
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-5 py-2.5 rounded-full text-sm font-semibold shadow-xl fade flex items-center gap-2" style={toastStyle}>
              {toast.type==='ok'?<I.check/>:<I.alert/>} {toast.msg}
            </div>
          )}

          {appLoading?(
            <div className="flex items-center justify-center py-24 gap-3">
              <Spinner/><span style={{color:'#888',fontSize:'14px'}}>Carregando...</span>
            </div>
          ):(
            <>
              {view==='dashboard' && <DashboardView user={user} requests={requests}/>}
              {view==='requests'  && <SolicitacoesView user={user} requests={requests} onSelect={id=>{setSelected(id);setView('detail');}} onNew={()=>setView('new')} dispatch={syncDispatch} showToast={showToast}/>}
              {view==='new'       && <NewRequestForm user={user} requests={requests} onSubmit={handleSubmit} onBack={()=>setView('requests')}/>}
              {view==='edit'      && <NewRequestForm user={user} requests={requests} editReq={editingReq} onSubmit={handleUpdate} onBack={()=>{setEditingReq(null);setView('detail');}}/>}
              {view==='detail'&&selectedReq && <RequestDetail req={selectedReq} user={user} onBack={()=>setView('requests')} dispatch={syncDispatch} showToast={showToast} onEdit={r=>{setEditingReq(r);setView('edit');}}/>}
              {view==='admin'     && <AdminView showToast={showToast}/>}
            </>
          )}

        </div>
      </main>

      <div className="hidden md:block fixed bottom-3 right-4 text-xs font-mono" style={{color:'#333'}}>Deep Pagamentos · Supabase</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
